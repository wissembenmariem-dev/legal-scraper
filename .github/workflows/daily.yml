name: Daily Legal Jobs Scrape

# Runs every morning at 08:30 Europe/Luxembourg.
# Luxembourg is UTC+1 in winter, UTC+2 in summer. GitHub Actions cron
# runs in UTC only, so we schedule both and let the code handle the rest.
# 06:30 UTC = 08:30 CEST (summer) / 07:30 CET (winter)
# 07:30 UTC = 09:30 CEST (summer) / 08:30 CET (winter)
# We run at both times but the second run is idempotent (upserts by External ID).
on:
  schedule:
    - cron: "30 6 * * *"   # summer 08:30 LUX
    - cron: "30 7 * * *"   # winter 08:30 LUX
  workflow_dispatch:       # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TZ: Europe/Luxembourg
        run: python main.py
