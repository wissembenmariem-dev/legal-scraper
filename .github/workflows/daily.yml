name: Daily Legal Jobs Scrape

# Runs every morning at ~08:00 Europe/Luxembourg.
# Luxembourg is UTC+1 in winter, UTC+2 in summer. A single cron at 06:00 UTC
# gives 08:00 CEST in summer and 07:00 CET in winter — 1h off twice a year
# at DST transitions, which is acceptable for a morning digest.
on:
  schedule:
    - cron: "0 6 * * *"    # 08:00 CEST (summer) / 07:00 CET (winter)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TZ: Europe/Luxembourg
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py
